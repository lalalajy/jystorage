<body>

<h1>동인고 입시 분석 시스템</h1>

<input type="text" id="name" placeholder="이름을 입력하세요">

<button onclick="sayHello()">확인</button>

<p id="result"></p>

<script>
function sayHello() {
    let name = document.getElementById("name").value;
    document.getElementById("result").innerHTML =
        "안녕하세요 " + name + "님!";
}
</script>

</body>
</html>
